<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Engine — Conviction Capital</title>
<style>
  :root {
    --bg: #0e0c0a;
    --surface: #15110d;
    --surface2: #1c1814;
    --border: #2e2820;
    --text: #e8e0d0;
    --muted: #8a8275;
    --accent: #c9a55c;
    --green: #6b9b6b;
    --red: #b87055;
    --yellow: #e0c084;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Consolas', monospace; font-size: 13px; min-height: 100vh; }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .back-btn {
    color: var(--muted); text-decoration: none; font-size: 12px;
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px;
    transition: color 0.2s, border-color 0.2s;
  }
  .back-btn:hover { color: var(--text); border-color: var(--muted); }
  .header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.05em; }
  .header h1 span { color: var(--accent); }
  .refresh-btn {
    background: var(--accent); color: #fff; border: none; border-radius: 4px;
    padding: 5px 14px; font-size: 11px; cursor: pointer; font-family: inherit;
  }
  .refresh-btn:hover { opacity: 0.9; }
  .refresh-btn:disabled { opacity: 0.4; }

  /* Show tabs */
  .show-tabs {
    display: flex; gap: 6px; padding: 12px 24px; overflow-x: auto;
    background: var(--bg); border-bottom: 1px solid var(--border);
  }
  .show-tab {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted); cursor: pointer;
    font-size: 11px; white-space: nowrap; font-family: inherit;
  }
  .show-tab:hover { color: var(--text); border-color: var(--muted); }
  .show-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .grid {
    display: grid; grid-template-columns: 1fr; gap: 14px;
    padding: 20px 24px; max-width: 1100px; margin: 0 auto;
  }

  .ep-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 18px 22px;
  }
  .ep-card.processing { opacity: 0.55; }
  .ep-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
  .ep-show {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--accent); margin-bottom: 4px;
  }
  .ep-title { font-size: 15px; font-weight: 700; line-height: 1.4; margin: 4px 0 4px; }
  .ep-date { font-size: 10px; color: var(--muted); }
  .ep-state {
    font-size: 9px; text-transform: uppercase; padding: 2px 8px;
    border-radius: 10px; letter-spacing: 0.1em; flex-shrink: 0;
  }
  .ep-state.ready             { background: rgba(107,155,107,0.15); color: var(--green); }
  .ep-state.transcribed       { background: rgba(224,192,132,0.15); color: var(--yellow); }
  .ep-state.downloaded,
  .ep-state.fetched           { background: rgba(138,130,117,0.15); color: var(--muted); }
  .ep-state.error_transcribe,
  .ep-state.error_intel,
  .ep-state.error_download    { background: rgba(184,112,85,0.15); color: var(--red); }

  .intel { margin-top: 14px; }
  .intel-row {
    display: flex; gap: 10px; padding: 8px 0; font-size: 12px;
    border-top: 1px dashed rgba(201,165,92,0.12); line-height: 1.55;
  }
  .intel-row:first-of-type { border-top: none; }
  .intel-label {
    min-width: 110px; flex-shrink: 0; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
    font-weight: 700;
  }
  .intel-value { color: var(--text); flex: 1; }
  .pill {
    display: inline-block; padding: 2px 8px; margin: 2px 4px 2px 0;
    background: rgba(201,165,92,0.12); border-radius: 10px;
    font-size: 10px; color: var(--accent);
  }
  .ticker-pill {
    display: inline-block; padding: 2px 8px; margin: 2px 4px 2px 0;
    background: rgba(107,155,107,0.15); border-radius: 4px;
    font-size: 10px; color: var(--green); font-weight: 700;
  }
  .quote {
    background: var(--surface2); border-left: 2px solid var(--accent);
    padding: 8px 12px; margin: 4px 0; font-size: 11px; color: var(--text);
    line-height: 1.5; font-style: italic;
  }
  .quote-speaker { font-style: normal; color: var(--muted); font-size: 9px; }

  .layered {
    background: rgba(201,165,92,0.04); border: 1px solid rgba(201,165,92,0.18);
    padding: 12px 16px; border-radius: 6px; margin-top: 10px;
    font-size: 12.5px; line-height: 1.6; color: var(--text);
  }
  .layered-hdr {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--accent); font-weight: 700; margin-bottom: 6px;
  }

  .hooks { margin-top: 10px; }
  .hook {
    background: var(--surface2); padding: 8px 12px; border-radius: 4px;
    margin: 4px 0; font-size: 11.5px; color: var(--text); line-height: 1.5;
  }
  .hook::before {
    content: "▶ "; color: var(--accent); font-size: 9px;
  }

  .lessons li {
    list-style: none; padding: 6px 0 6px 18px; position: relative;
    font-size: 12px; line-height: 1.55;
  }
  .lessons li::before {
    content: "◆"; position: absolute; left: 0; top: 7px;
    color: var(--accent); font-size: 10px;
  }

  .loading, .empty {
    grid-column: 1/-1; text-align: center; padding: 60px 24px;
    color: var(--muted); font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a class="back-btn" href="/mainframe.html">⬡ WAR ROOM</a>
    <a class="back-btn" href="/picks.html" style="margin-left:6px">Picks</a>
    <a class="back-btn" href="/screener.html" style="margin-left:6px">Screener</a>
    <a class="back-btn" href="/charts.html" style="margin-left:6px">Charts</a>
    <a class="back-btn" href="/sports.html" style="margin-left:6px">Sports</a>
    <h1>CONTENT <span>ENGINE</span></h1>
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="refresh()">Refresh</button>
</div>

<div class="show-tabs" id="show-tabs">
  <button class="show-tab active" data-show="all" onclick="setShow(this)">All Shows</button>
</div>

<div class="grid" id="grid">
  <div class="loading"><div class="spinner"></div>Loading podcast intelligence…</div>
</div>

<script>
let allEpisodes = [];
let activeShow = 'all';

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function formatDate(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleString();
}

function setShow(btn) {
  document.querySelectorAll('.show-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeShow = btn.dataset.show;
  renderGrid();
}

function renderShows(shows) {
  const tabs = document.getElementById('show-tabs');
  tabs.innerHTML =
    '<button class="show-tab active" data-show="all" onclick="setShow(this)">All Shows</button>'
    + shows.map(s =>
      `<button class="show-tab" data-show="${s.id}" onclick="setShow(this)">${escapeHtml(s.name)}</button>`
    ).join('');
}

function renderIntel(intel, kind) {
  if (!intel) return '<div class="intel-row"><span class="intel-value">Intelligence not extracted yet.</span></div>';

  const tickers = (intel.tickers || []).map(t =>
    `<span class="ticker-pill">${escapeHtml(t)}</span>`).join('');
  const themes  = (intel.themes  || []).map(t =>
    `<span class="pill">${escapeHtml(t)}</span>`).join('');

  const quotes = (intel.key_quotes || []).map(q => `
    <div class="quote">
      "${escapeHtml(q.quote)}"
      <div class="quote-speaker">— ${escapeHtml(q.speaker || 'unknown')}</div>
    </div>`).join('');

  const hooks = (intel.short_hooks || []).map(h =>
    `<div class="hook">${escapeHtml(h)}</div>`).join('');

  const lessons = (intel.lessons || []).map(l =>
    `<li>${escapeHtml(l)}</li>`).join('');

  const guestRow = intel.guest ? `
    <div class="intel-row">
      <span class="intel-label">Guest</span>
      <span class="intel-value"><strong>${escapeHtml(intel.guest)}</strong>${intel.guest_credibility ? ' — ' + escapeHtml(intel.guest_credibility) : ''}</span>
    </div>` : '';

  return `
    ${guestRow}
    <div class="intel-row">
      <span class="intel-label">What</span>
      <span class="intel-value">${escapeHtml(intel.summary_plain || '')}</span>
    </div>
    <div class="intel-row">
      <span class="intel-label">Why</span>
      <span class="intel-value">${escapeHtml(intel.summary_why || '')}</span>
    </div>
    <div class="intel-row">
      <span class="intel-label">Impact</span>
      <span class="intel-value">${escapeHtml(intel.summary_impact || '')}</span>
    </div>
    ${tickers ? `<div class="intel-row"><span class="intel-label">Tickers</span><span class="intel-value">${tickers}</span></div>` : ''}
    ${themes  ? `<div class="intel-row"><span class="intel-label">Themes</span><span class="intel-value">${themes}</span></div>` : ''}

    ${lessons ? `
      <div class="intel-row"><span class="intel-label">Lessons</span>
        <span class="intel-value"><ul class="lessons">${lessons}</ul></span>
      </div>` : ''}

    ${intel.layered_take ? `
      <div class="layered">
        <div class="layered-hdr">Layered Take</div>
        ${escapeHtml(intel.layered_take)}
      </div>` : ''}

    ${quotes ? `<div class="intel-row"><span class="intel-label">Quotes</span><span class="intel-value">${quotes}</span></div>` : ''}

    ${hooks ? `
      <div class="hooks">
        <div class="layered-hdr" style="margin-bottom:4px">Short hooks (pick one to record)</div>
        ${hooks}
      </div>` : ''}
  `;
}

function renderCard(ep) {
  const processing = ep.state !== 'ready' && !ep.intel;
  return `
    <div class="ep-card${processing ? ' processing' : ''}">
      <div class="ep-top">
        <div>
          <div class="ep-show">${escapeHtml(ep.show_name)}</div>
          <div class="ep-title">${escapeHtml(ep.title)}</div>
          <div class="ep-date">${escapeHtml(formatDate(ep.pub_date))}</div>
        </div>
        <span class="ep-state ${ep.state}">${escapeHtml(ep.state)}</span>
      </div>
      <div class="intel">${renderIntel(ep.intel)}</div>
    </div>
  `;
}

function renderGrid() {
  const filtered = activeShow === 'all'
    ? allEpisodes
    : allEpisodes.filter(e => (e.show_id || '').includes(activeShow) ||
                              (e.show_name || '').toLowerCase().includes(activeShow.replace('_', ' ')));

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div style="font-weight:600;margin-bottom:6px">No episodes yet.</div>
        <div>Click Refresh — first run pulls feeds, transcribes audio, and extracts intel.<br>
        Needs OPENAI_API_KEY (Whisper) and ANTHROPIC_API_KEY (Claude) set.</div>
      </div>`;
    return;
  }
  grid.innerHTML = filtered.map(renderCard).join('');
}

let _retry = null;
async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true; btn.textContent = 'Loading…';
  try {
    const res = await fetch('/api/podcasts');
    const data = await res.json();
    renderShows(data.shows || []);
    allEpisodes = data.episodes || [];
    renderGrid();
    // If something is still processing, poll again
    if (allEpisodes.some(e => e.state !== 'ready' && !e.state.startsWith('error'))) {
      clearTimeout(_retry);
      _retry = setTimeout(loadData, 15000);
    }
  } catch (e) {
    document.getElementById('grid').innerHTML =
      `<div class="empty">Error loading podcasts: ${escapeHtml(e.message)}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = 'Refresh';
  }
}

async function refresh() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true; btn.textContent = 'Pulling…';
  try {
    await fetch('/api/podcasts/refresh', { method: 'POST' });
    setTimeout(loadData, 1500);
  } catch (e) {
    btn.disabled = false; btn.textContent = 'Refresh';
  }
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
