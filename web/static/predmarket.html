<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Market Scanner</title>
<style>
  :root {
    /* Conviction Capital — black · brown · gold · grey */
    --bg: #0e0c0a;
    --surface: #15110d;
    --surface2: #1c1814;
    --border: #2e2820;
    --text: #e8e0d0;
    --muted: #8a8275;
    --accent: #c9a55c;
    --green: #6b9b6b;
    --red: #b87055;
    --orange: #c9a55c;
    --yellow: #e0c084;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Consolas', monospace; font-size: 13px; min-height: 100vh; }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .back-btn {
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    transition: color 0.2s, border-color 0.2s;
  }
  .back-btn:hover { color: var(--text); border-color: var(--muted); }
  .header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.05em; color: var(--text); }
  .header h1 span { color: var(--accent); }
  .status-row { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--muted); }
  .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; display: inline-block; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .refresh-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 5px 14px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s;
  }
  .refresh-btn:hover { opacity: 0.85; }
  .refresh-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 24px;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .stat { text-align: center; white-space: nowrap; }
  .stat-val { font-size: 20px; font-weight: 700; color: var(--text); }
  .stat-val.green { color: var(--green); }
  .stat-val.orange { color: var(--orange); }
  .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-sep { width: 1px; background: var(--border); align-self: stretch; }

  /* ── Filter tabs ── */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 14px 24px;
    overflow-x: auto;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: inherit;
  }
  .tab:hover { color: var(--text); border-color: var(--muted); }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Controls ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 24px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .controls label { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .controls input[type=range] { accent-color: var(--accent); width: 100px; }
  #edge-val { color: var(--text); font-weight: 600; min-width: 30px; }

  /* ── Cards grid ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    padding: 20px 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── Pair card ── */
  .pair-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    transition: border-color 0.2s;
  }
  .pair-card:hover { border-color: var(--accent); }
  .pair-card.edge-huge  { border-left: 3px solid var(--red); }
  .pair-card.edge-large { border-left: 3px solid var(--orange); }
  .pair-card.edge-mid   { border-left: 3px solid var(--yellow); }
  .pair-card.edge-small { border-left: 3px solid var(--muted); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .bet-headline {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.35;
    margin: 6px 0 4px;
  }
  .bet-summary {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .bet-summary .yes { color: var(--green); font-weight: 600; }
  .bet-summary .no  { color: var(--red);   font-weight: 600; }
  .bet-summary .mark { color: var(--accent); font-weight: 600; }
  .cat-badge {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .edge-pill {
    font-size: 13px;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .edge-pill.huge  { background: rgba(239,68,68,0.15);  color: var(--red); }
  .edge-pill.large { background: rgba(245,158,11,0.15); color: var(--orange); }
  .edge-pill.mid   { background: rgba(234,179,8,0.15);  color: var(--yellow); }
  .edge-pill.small { background: rgba(100,116,139,0.1); color: var(--muted); }

  .platforms { display: flex; gap: 12px; margin: 10px 0; }
  .platform-block {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    color: inherit;
    text-decoration: none;
    transition: border-color 0.15s, background 0.15s, transform 0.15s;
    cursor: pointer;
    position: relative;
  }
  .platform-block:hover {
    border-color: var(--accent);
    background: #221d16;
    transform: translateY(-1px);
  }
  .platform-block:active { transform: translateY(0); }
  .plat-name { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 4px; }
  .plat-prob {
    font-size: 24px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }
  .plat-prob.higher { color: var(--green); }
  .plat-prob.lower  { color: var(--muted); }
  .plat-title { font-size: 11px; color: var(--text); line-height: 1.45; margin-bottom: 8px; opacity: 0.9; }
  .plat-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: auto;
    padding-top: 6px;
  }
  .plat-vol { font-size: 9px; color: var(--muted); }
  .plat-cta {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px solid var(--accent);
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(201,165,92,0.08);
  }
  .platform-block:hover .plat-cta {
    background: var(--accent);
    color: #15110d;
  }

  .card-analysis {
    background: rgba(59,130,246,0.05);
    border: 1px solid rgba(59,130,246,0.15);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 11px;
    color: #94a3b8;
    line-height: 1.6;
    margin-top: 8px;
  }
  .card-analysis strong { color: var(--text); }

  /* ── Reality check block ── */
  .reality-check {
    margin-top: 10px;
    background: rgba(201,165,92,0.04);
    border: 1px solid rgba(201,165,92,0.18);
    border-radius: 6px;
    padding: 10px 14px;
  }
  .rc-header {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .rc-header::before {
    content: "◆";
    font-size: 9px;
  }
  .rc-source {
    display: flex;
    gap: 8px;
    align-items: baseline;
    padding: 4px 0;
    font-size: 11px;
    border-top: 1px dashed rgba(201,165,92,0.12);
  }
  .rc-source:first-of-type { border-top: none; }
  .rc-label {
    color: var(--muted);
    flex-shrink: 0;
    min-width: 130px;
    font-weight: 600;
  }
  .rc-value { color: var(--text); flex: 1; }
  .rc-meta { font-size: 9px; color: var(--muted); margin-left: 8px; }
  .rc-verdict {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(201,165,92,0.18);
    font-size: 11px;
    color: var(--yellow);
    font-weight: 600;
    line-height: 1.5;
  }

  .card-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 10px;
    color: var(--muted);
  }
  .kelly-tag {
    background: rgba(16,185,129,0.1);
    color: var(--green);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
  }
  .match-tag {
    color: #334155;
    font-size: 10px;
  }

  /* ── Empty / Loading states ── */
  .loading, .empty {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }
  .loading { font-size: 14px; }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }

  /* ── Error banner ── */
  .error-banner {
    margin: 16px 24px;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.25);
    color: var(--red);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 12px;
    display: none;
  }
  .error-banner.show { display: block; }

  @media (min-width: 900px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }
  @media (min-width: 1300px) {
    .grid { grid-template-columns: 1fr 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="header-left">
    <a class="back-btn" href="/">← Dashboard</a>
    <h1>PREDICTION MARKET <span>SCANNER</span></h1>
  </div>
  <div class="status-row">
    <span class="pulse"></span>
    <span id="scan-status">Loading…</span>
    <span id="last-scan"></span>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData(true)">Refresh</button>
  </div>
</div>

<!-- ── Stats bar ── -->
<div class="stats-bar" id="stats-bar">
  <div class="stat"><div class="stat-val" id="s-kalshi">—</div><div class="stat-lbl">Kalshi Markets</div></div>
  <div class="stat-sep"></div>
  <div class="stat"><div class="stat-val" id="s-poly">—</div><div class="stat-lbl">Polymarket Markets</div></div>
  <div class="stat-sep"></div>
  <div class="stat"><div class="stat-val" id="s-matches">—</div><div class="stat-lbl">Matched Pairs</div></div>
  <div class="stat-sep"></div>
  <div class="stat"><div class="stat-val green" id="s-large">—</div><div class="stat-lbl">Edge ≥5%</div></div>
  <div class="stat-sep"></div>
  <div class="stat"><div class="stat-val orange" id="s-showing">—</div><div class="stat-lbl">Showing</div></div>
</div>

<!-- ── Tabs ── -->
<div class="tabs" id="tabs">
  <button class="tab active" data-cat="all" onclick="setCategory(this)">All Markets</button>
  <button class="tab" data-cat="economics"   onclick="setCategory(this)">Economics</button>
  <button class="tab" data-cat="weather"     onclick="setCategory(this)">Weather</button>
  <button class="tab" data-cat="sports"      onclick="setCategory(this)">Sports</button>
  <button class="tab" data-cat="finance"     onclick="setCategory(this)">Finance</button>
  <button class="tab" data-cat="geopolitics" onclick="setCategory(this)">Geopolitics</button>
  <button class="tab" data-cat="science_tech" onclick="setCategory(this)">Science & Tech</button>
  <button class="tab" data-cat="other"       onclick="setCategory(this)">Other</button>
</div>

<!-- ── Controls ── -->
<div class="controls">
  <label>
    Min edge:
    <input type="range" id="edge-slider" min="0" max="20" step="1" value="2" oninput="updateEdgeFilter(this.value)">
    <span id="edge-val">2%</span>
  </label>
  <span style="color:var(--muted);font-size:11px;">Sorted by largest discrepancy first</span>
</div>

<!-- ── Error ── -->
<div class="error-banner" id="error-banner"></div>

<!-- ── Main grid ── -->
<div class="grid" id="grid">
  <div class="loading">
    <div class="spinner"></div>
    Scanning Kalshi and Polymarket — this takes ~15 seconds on first load…
  </div>
</div>

<script>
let allPairs = [];
let activeCategory = 'all';
let minEdge = 2;

const CAT_COLORS = {
  economics:    '#c9a55c',  /* gold */
  weather:      '#8a8275',  /* warm grey */
  sports:       '#e0c084',  /* light gold */
  finance:      '#6b9b6b',  /* muted green */
  geopolitics:  '#b87055',  /* brown-red */
  science_tech: '#8a6f3a',  /* deep gold */
  other:        '#5c4a3a',  /* brown */
};

function edgeClass(pct) {
  if (pct >= 15) return 'huge';
  if (pct >= 8)  return 'large';
  if (pct >= 4)  return 'mid';
  return 'small';
}

function fmtVol(v) {
  if (!v) return '';
  if (v >= 1_000_000) return `$${(v/1_000_000).toFixed(1)}M vol`;
  if (v >= 1_000)     return `$${(v/1_000).toFixed(0)}K vol`;
  return `$${v} vol`;
}

function pickHeadline(k, pm) {
  // Prefer the longer, more descriptive title
  const a = (k.title || '').trim();
  const b = (pm.title || '').trim();
  return a.length >= b.length ? a : b;
}

function buildSummary(k, pm, edgePct) {
  const kPct  = (k.yes_prob  * 100).toFixed(1);
  const pmPct = (pm.yes_prob * 100).toFixed(1);
  const kHigher = k.yes_prob > pm.yes_prob;
  const cheap = kHigher ? 'Polymarket' : 'Kalshi';
  const expensive = kHigher ? 'Kalshi' : 'Polymarket';
  const cheapPct = kHigher ? pmPct : kPct;
  const expensivePct = kHigher ? kPct : pmPct;
  return `
    The bet: <span class="mark">YES this happens.</span>
    <br>
    <span class="mark">${expensive}</span> says it's <span class="yes">${expensivePct}%</span> likely.
    <span class="mark">${cheap}</span> says it's only <span class="no">${cheapPct}%</span> likely.
    <br>
    Buy <span class="yes">YES on ${cheap}</span> (cheap) — sell or skip on ${expensive}.
    Edge: <strong style="color:var(--accent)">${edgePct.toFixed(1)} percentage points.</strong>
  `;
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function renderRealityCheck(p) {
  const rc = p.reality_check;
  if (!rc || !rc.sources || rc.sources.length === 0) return '';

  const rows = rc.sources.map(s => {
    const meta = s.match ? `<span class="rc-meta">match ${(s.match*100).toFixed(0)}%</span>` : '';
    const titleLine = s.title ? `<div class="rc-meta" style="margin-left:0;margin-top:2px">${escapeHtml(s.title)}</div>` : '';
    return `
      <div class="rc-source">
        <span class="rc-label">${escapeHtml(s.label)}</span>
        <span class="rc-value">${escapeHtml(s.value)}${meta}${titleLine}</span>
      </div>`;
  }).join('');

  const verdict = rc.verdict
    ? `<div class="rc-verdict">${escapeHtml(rc.verdict)}</div>`
    : '';

  return `
    <div class="reality-check">
      <div class="rc-header">Reality Check</div>
      ${rows}
      ${verdict}
    </div>`;
}

function renderCard(p) {
  const k  = p.kalshi;
  const pm = p.polymarket;
  const ec = edgeClass(p.edge_pct);
  const kHigher = k.yes_prob > pm.yes_prob;
  const color = CAT_COLORS[p.category] || '#5c4a3a';
  const headline = pickHeadline(k, pm);

  return `
  <div class="pair-card edge-${ec}">
    <div class="card-top">
      <span class="cat-badge" style="background:${color}22;color:${color}">${p.category_label}</span>
      <span class="edge-pill ${ec}">${p.edge_pct.toFixed(1)}pp EDGE</span>
    </div>
    <div class="bet-headline">${headline}</div>
    <div class="bet-summary">${buildSummary(k, pm, p.edge_pct)}</div>
    <div class="platforms">
      <a class="platform-block" href="${k.url}" target="_blank" rel="noopener">
        <div class="plat-name">Kalshi · YES price</div>
        <div class="plat-prob ${kHigher ? 'higher' : 'lower'}">${(k.yes_prob*100).toFixed(1)}%</div>
        <div class="plat-title">${k.title}</div>
        <div class="plat-foot">
          <span class="plat-vol">${fmtVol(k.volume)}</span>
          <span class="plat-cta">Open ↗</span>
        </div>
      </a>
      <a class="platform-block" href="${pm.url}" target="_blank" rel="noopener">
        <div class="plat-name">Polymarket · YES price</div>
        <div class="plat-prob ${!kHigher ? 'higher' : 'lower'}">${(pm.yes_prob*100).toFixed(1)}%</div>
        <div class="plat-title">${pm.title}</div>
        <div class="plat-foot">
          <span class="plat-vol">${fmtVol(pm.volume)}</span>
          <span class="plat-cta">Open ↗</span>
        </div>
      </a>
    </div>
    <div class="card-analysis">
      <strong>What this means:</strong> ${p.plain_english}
    </div>
    ${renderRealityCheck(p)}
    <div class="card-bottom">
      <span class="match-tag">Match confidence: ${(p.match_score*100).toFixed(0)}% · Resolves in ~${p.days_to_close ?? '?'} days</span>
      <span class="kelly-tag">Suggested size (¼-Kelly): ${(p.kelly*100).toFixed(1)}% of bankroll</span>
    </div>
  </div>`;
}

function renderGrid() {
  const filtered = allPairs.filter(p => {
    if (activeCategory !== 'all' && p.category !== activeCategory) return false;
    if (p.edge_pct < minEdge) return false;
    return true;
  });

  document.getElementById('s-showing').textContent = filtered.length;

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div style="font-weight:600;margin-bottom:6px">No pairs match your filters.</div>
      <div style="color:var(--muted);font-size:13px">Try lowering the minimum edge or switching category.</div>
    </div>`;
    return;
  }
  grid.innerHTML = filtered.map(renderCard).join('');
}

function setCategory(btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeCategory = btn.dataset.cat;
  renderGrid();
}

function updateEdgeFilter(val) {
  minEdge = parseInt(val);
  document.getElementById('edge-val').textContent = val + '%';
  renderGrid();
}

let _retryTimer = null;

async function loadData(force = false) {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = 'Scanning…';
  document.getElementById('scan-status').textContent = 'Scanning markets…';
  document.getElementById('error-banner').classList.remove('show');

  const url = force ? '/api/predmarkets?bust=' + Date.now() : '/api/predmarkets';
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    // Backend reports first scan still running — show progress UI + auto-retry
    if (data.scanning === true && (!data.pairs || data.pairs.length === 0)) {
      document.getElementById('s-kalshi').textContent  = '…';
      document.getElementById('s-poly').textContent    = '…';
      document.getElementById('s-matches').textContent = '…';
      document.getElementById('s-large').textContent   = '…';
      document.getElementById('grid').innerHTML =
        `<div class="empty" style="grid-column:1/-1">
          <div style="margin-bottom:14px;font-size:18px;font-weight:600">Scanning prediction markets…</div>
          <div style="color:var(--muted);font-size:14px;margin-bottom:6px">
            Pulling thousands of contracts from Kalshi + Polymarket and matching equivalent questions.
          </div>
          <div style="color:var(--muted);font-size:13px">First scan takes ~30-60 seconds. Auto-retrying.</div>
        </div>`;
      document.getElementById('scan-status').textContent = 'First scan in progress…';
      clearTimeout(_retryTimer);
      _retryTimer = setTimeout(() => loadData(), 8000);
      return;
    }

    allPairs = data.pairs || [];
    const stats = data.stats || {};

    document.getElementById('s-kalshi').textContent  = stats.total_kalshi    ?? '—';
    document.getElementById('s-poly').textContent    = stats.total_polymarket ?? '—';
    document.getElementById('s-matches').textContent = stats.matches_found   ?? '—';
    document.getElementById('s-large').textContent   = stats.large_edges     ?? '—';

    renderGrid();

    const now = new Date();
    document.getElementById('last-scan').textContent =
      `Last scan: ${now.toLocaleTimeString()}`;
    document.getElementById('scan-status').textContent =
      `${allPairs.length} pairs found`;

  } catch (err) {
    const banner = document.getElementById('error-banner');
    banner.textContent = `Scan error: ${err.message}. Retrying in 10s…`;
    banner.classList.add('show');
    document.getElementById('scan-status').textContent = 'Error — retry';
    clearTimeout(_retryTimer);
    _retryTimer = setTimeout(() => loadData(), 10000);
    if (allPairs.length === 0) {
      document.getElementById('grid').innerHTML =
        `<div class="empty" style="grid-column:1/-1">
          <div style="margin-bottom:10px;font-weight:600">Could not reach the scanner.</div>
          Auto-retrying every 10 seconds.
        </div>`;
    }
  } finally {
    btn.disabled = false;
    btn.textContent = 'Refresh';
  }
}

// Auto-refresh every 4 minutes
loadData();
setInterval(() => loadData(), 4 * 60 * 1000);
</script>
</body>
</html>
