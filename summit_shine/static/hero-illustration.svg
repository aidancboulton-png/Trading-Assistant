<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2f1c"/>
      <stop offset="40%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#0a1410"/>
    </linearGradient>
    <radialGradient id="sun" cx="78%" cy="28%" r="20%">
      <stop offset="0%" stop-color="#bbf7d0" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#84cc16" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hillFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="hillMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="hillNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a2f1c"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1440" height="900" fill="url(#sky)"/>
  <!-- Soft "sun" glow -->
  <rect width="1440" height="900" fill="url(#sun)"/>

  <!-- Subtle particle/leaf flecks for cinematic feel -->
  <g opacity="0.5" fill="#a3e635">
    <circle cx="220" cy="180" r="1.2"/>
    <circle cx="380" cy="240" r="0.8"/>
    <circle cx="610" cy="120" r="1.5"/>
    <circle cx="880" cy="200" r="1"/>
    <circle cx="1180" cy="160" r="0.8"/>
    <circle cx="1320" cy="280" r="1.2"/>
    <circle cx="160" cy="320" r="0.9"/>
    <circle cx="940" cy="340" r="1.3"/>
    <circle cx="1080" cy="80" r="1"/>
    <circle cx="500" cy="380" r="0.7"/>
  </g>

  <!-- Far mountain ridges -->
  <path d="M0 600 L80 540 L180 580 L300 510 L420 560 L560 490 L700 540 L840 470 L980 520 L1120 460 L1260 520 L1380 480 L1440 510 L1440 900 L0 900 Z"
        fill="url(#hillFar)" opacity="0.85"/>

  <!-- Mid mountains -->
  <path d="M0 720 L120 640 L240 690 L380 600 L520 670 L660 580 L820 650 L960 570 L1100 630 L1260 560 L1380 620 L1440 600 L1440 900 L0 900 Z"
        fill="url(#hillMid)" filter="url(#soft)"/>

  <!-- Foreground hill -->
  <path d="M0 820 L160 760 L320 800 L500 740 L700 790 L900 730 L1100 780 L1280 720 L1440 760 L1440 900 L0 900 Z"
        fill="url(#hillNear)"/>

  <!-- Subtle leaf silhouettes scattered -->
  <g opacity="0.18" fill="#84cc16">
    <path d="M120 700 q-6 -18 12 -28 q18 -2 18 18 q-6 14 -30 10 Z"/>
    <path d="M1280 660 q-8 -22 16 -32 q22 0 20 22 q-8 16 -36 10 Z"/>
    <path d="M880 760 q-7 -20 14 -30 q20 -1 18 20 q-6 14 -32 10 Z"/>
  </g>
</svg>
