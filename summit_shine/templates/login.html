{% extends "base.html" %}
{% block title %}Sign in · {{ BUSINESS_NAME }}{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-20">
  <div class="flex flex-col items-center mb-8">
    <span class="inline-block w-20 h-20 rounded-full logo-orb mb-4"></span>
    <h1 class="text-2xl font-semibold tracking-wider">{{ BUSINESS_NAME|upper }}</h1>
    <p class="text-sm text-slate-500 mt-1">Sign in to continue</p>
  </div>
  <form method="post" action="/login" class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
    {% if error %}
    <div class="mb-4 p-3 rounded-md bg-red-50 border border-red-200 text-red-700 text-sm">{{ error }}</div>
    {% endif %}
    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
    <input type="password" name="password" required autofocus
           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none">
    <button class="mt-4 w-full bg-brand-600 hover:bg-brand-700 text-white font-medium py-2 rounded-md transition">
      Sign in
    </button>
  </form>
</div>
{% endblock %}
