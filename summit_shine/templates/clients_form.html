{% extends "base.html" %}
{% block title %}{% if client %}Edit{% else %}New{% endif %} client · {{ BUSINESS_NAME }}{% endblock %}
{% block content %}
<a href="/clients{% if client %}/{{ client.id }}{% endif %}" class="text-sm text-slate-500 hover:text-brand-700">← Back</a>
<h1 class="text-2xl font-semibold mt-2 mb-6">{% if client %}Edit client{% else %}New client{% endif %}</h1>

<form method="post" action="{% if client %}/clients/{{ client.id }}/edit{% else %}/clients/new{% endif %}"
      class="bg-white border border-slate-200 rounded-xl p-6 max-w-2xl">
  <div class="grid md:grid-cols-2 gap-4">
    <label class="block">
      <span class="text-sm font-medium text-slate-700">Name *</span>
      <input name="name" required value="{{ client.name if client else '' }}"
             class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none">
    </label>
    <label class="block">
      <span class="text-sm font-medium text-slate-700">Property type</span>
      <select name="property_type" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none">
        <option value=""></option>
        {% for pt in PROPERTY_TYPES %}
          <option value="{{ pt }}" {% if client and client.property_type == pt %}selected{% endif %}>{{ pt }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="block">
      <span class="text-sm font-medium text-slate-700">Phone</span>
      <input name="phone" value="{{ client.phone if client else '' }}"
             class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none">
    </label>
    <label class="block">
      <span class="text-sm font-medium text-slate-700">Email</span>
      <input type="email" name="email" value="{{ client.email if client else '' }}"
             class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none">
    </label>
    <label class="block md:col-span-2">
      <span class="text-sm font-medium text-slate-700">Address</span>
      <input name="address" value="{{ client.address if client else '' }}"
             class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none">
    </label>
    <label class="block md:col-span-2">
      <span class="text-sm font-medium text-slate-700">Notes</span>
      <textarea name="notes" rows="3"
                class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none">{{ client.notes if client else '' }}</textarea>
    </label>
  </div>
  <div class="mt-6 flex gap-2">
    <button class="px-4 py-2 rounded-md bg-brand-600 text-white hover:bg-brand-700 text-sm font-medium">
      {% if client %}Save changes{% else %}Create client{% endif %}
    </button>
    <a href="/clients{% if client %}/{{ client.id }}{% endif %}" class="px-4 py-2 rounded-md border border-slate-300 hover:bg-slate-50 text-sm">Cancel</a>
  </div>
</form>
{% endblock %}
