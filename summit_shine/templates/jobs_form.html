{% extends "base.html" %}
{% block title %}{% if job %}Edit{% else %}New{% endif %} job · {{ BUSINESS_NAME }}{% endblock %}
{% block content %}
<a href="/jobs{% if job %}/{{ job.id }}{% endif %}" class="text-sm text-slate-500 hover:text-brand-700">← Back</a>
<h1 class="text-2xl font-semibold mt-2 mb-6">{% if job %}Edit job{% else %}New job{% endif %}</h1>

<form method="post" action="{% if job %}/jobs/{{ job.id }}/edit{% else %}/jobs/new{% endif %}"
      class="bg-white border border-slate-200 rounded-xl p-6 max-w-2xl">
  <div class="grid md:grid-cols-2 gap-4">
    <label class="block md:col-span-2">
      <span class="text-sm font-medium text-slate-700">Client *</span>
      <select name="client_id" required class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none">
        <option value="">— Choose a client —</option>
        {% for c in clients %}
          {% set sel = (job and job.client_id == c.id) or (preselect_client and preselect_client == c.id) %}
          <option value="{{ c.id }}" {% if sel %}selected{% endif %}>{{ c.name }}</option>
        {% endfor %}
      </select>
      {% if not clients %}<p class="text-xs text-slate-500 mt-1">No clients yet. <a href="/clients/new" class="text-brand-700 hover:underline">Add a client first</a>.</p>{% endif %}
    </label>
    <label class="block md:col-span-2">
      <span class="text-sm font-medium text-slate-700">Title *</span>
      <input name="title" required value="{{ job.title if job else '' }}" placeholder="e.g. Fortnightly clean — 12 King St"
             class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none">
    </label>
    <label class="block">
      <span class="text-sm font-medium text-slate-700">Scheduled for</span>
      <input type="date" name="scheduled_for" value="{{ job.scheduled_for if job else '' }}"
             class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none">
    </label>
    <label class="block">
      <span class="text-sm font-medium text-slate-700">Assigned to</span>
      <select name="assigned_to" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none">
        <option value=""></option>
        {% for t in TEAM %}
          <option value="{{ t }}" {% if job and job.assigned_to == t %}selected{% endif %}>{{ t }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="block">
      <span class="text-sm font-medium text-slate-700">Price</span>
      <input type="number" step="0.01" name="price" value="{{ job.price if job and job.price is not none else '' }}"
             class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none">
    </label>
    <label class="block">
      <span class="text-sm font-medium text-slate-700">Status</span>
      <select name="status" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none">
        {% for s in JOB_STATUSES %}
          <option value="{{ s }}" {% if job and job.status == s %}selected{% endif %}>{{ s|fmt_status }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="block md:col-span-2">
      <span class="text-sm font-medium text-slate-700">Description</span>
      <textarea name="description" rows="3" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none">{{ job.description if job else '' }}</textarea>
    </label>
    <label class="block md:col-span-2">
      <span class="text-sm font-medium text-slate-700">Internal notes</span>
      <textarea name="notes" rows="2" class="mt-1 w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none">{{ job.notes if job else '' }}</textarea>
    </label>
  </div>
  <div class="mt-6 flex gap-2">
    <button class="px-4 py-2 rounded-md bg-brand-600 text-white hover:bg-brand-700 text-sm font-medium">
      {% if job %}Save changes{% else %}Create job{% endif %}
    </button>
    <a href="/jobs{% if job %}/{{ job.id }}{% endif %}" class="px-4 py-2 rounded-md border border-slate-300 hover:bg-slate-50 text-sm">Cancel</a>
  </div>
</form>
{% endblock %}
