# Render blueprint for Summit Shine.
# Free tier: works for a demo / showing-it-to-your-buddy URL. SQLite DB lives
# in /tmp and resets on every cold start. When you're ready for real production
# data, upgrade the service to "starter" ($7/mo), uncomment the disk: block at
# the bottom, and change SUMMIT_DB back to /data/summit_shine.db.
services:
  - type: web
    name: summit-shine
    runtime: python
    plan: free
    rootDir: summit_shine
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUMMIT_PASSWORD
        sync: false
      - key: SUMMIT_SECRET
        generateValue: true
      - key: SUMMIT_BUSINESS_NAME
        value: Summit Shine
      - key: SUMMIT_TAGLINE
        value: Naturally spotless.
      - key: SUMMIT_BUSINESS_EMAIL
        sync: false
      - key: SUMMIT_BUSINESS_PHONE
        sync: false
      - key: SUMMIT_SERVICE_AREA
        sync: false
      - key: SUMMIT_CURRENCY
        value: "$"
      - key: SUMMIT_TAX_RATE
        value: "0"
      - key: SUMMIT_TEAM
        value: "Aidan,Partner"
      - key: SUMMIT_DB
        value: /tmp/summit_shine.db
      - key: PYTHON_VERSION
        value: 3.11.9
    # disk:                  # uncomment after upgrading from free to starter
    #   name: summit-data
    #   mountPath: /data
    #   sizeGB: 1
